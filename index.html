<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2 Mündliche Prüfung – Deutsch & Arabisch</title>
    <script src="b2-data.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#0c0c14;--bg2:#161622;--bg3:#1e1e32;
            --card:#1a1a2e;--card-hover:#222238;
            --border:rgba(255,255,255,0.06);--border-active:rgba(251,191,36,0.3);
            --text:#e8e8f0;--text-dim:#9999bb;--text-muted:#666688;
            --gold:#f59e0b;--gold-dim:rgba(245,158,11,0.25);--gold-bg:rgba(245,158,11,0.1);
            --green:#34d399;--green-bg:rgba(52,211,153,0.15);
            --red:#f87171;--red-bg:rgba(248,113,113,0.15);
            --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.15);
            --violet:#a78bfa;--violet-bg:rgba(167,139,250,0.15);
            --ar:#94a3b8;--ar-bg:rgba(148,163,184,0.08);
            --radius:12px;--radius-sm:8px;
            --shadow:0 8px 40px rgba(0,0,0,0.5);
        }
        html,body{height:100%}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased}
        .app{width:100%;max-width:640px;padding:16px 12px 100px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .logo{font-size:18px;font-weight:800}.logo span{color:var(--gold)}
        .logo-sub{font-size:9px;color:var(--text-muted);font-weight:500;margin-top:-1px}
        .badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--gold-bg);color:var(--gold);border:1px solid rgba(245,158,11,0.2)}
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
        .stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 4px;text-align:center}
        .stat-num{font-size:16px;font-weight:800;line-height:1.2}
        .stat-label{font-size:7px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
        .tabs{display:flex;gap:2px;margin-bottom:10px;background:var(--bg2);border-radius:var(--radius);padding:4px;flex-wrap:wrap}
        .tab{flex:1;min-width:50px;padding:10px 3px;text-align:center;border:none;background:transparent;color:var(--text-muted);font-family:inherit;font-size:10px;font-weight:700;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;line-height:1.2}
        .tab:hover{color:var(--text-dim)}
        .tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 12px rgba(0,0,0,.3)}
        .tab[data-tab="themes"].active{color:var(--gold);border-bottom:2px solid var(--gold);border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(245,158,11,0.08)}
        .tab[data-tab="problems"].active{color:var(--blue);border-bottom:2px solid var(--blue);border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(96,165,250,0.08)}
        .tab-group-divider{width:1px;background:var(--border);margin:6px 2px;flex-shrink:0}
        .tab[data-tab="phrases"].active{color:var(--violet);border-bottom:2px solid var(--violet);border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(167,139,250,0.08)}
        .tab[data-tab="myvocab"].active{color:var(--green);border-bottom:2px solid var(--green);border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(52,211,153,0.08)}
        .tab[data-tab="quiz"].active{color:#f472b6;border-bottom:2px solid #f472b6;border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(244,114,182,0.08)}
        .search-wrap{position:relative;margin-bottom:10px}
        .search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:12px;padding:9px 12px 9px 34px;outline:none}
        .search-wrap input::placeholder{color:var(--text-muted)}.search-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
        .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px;pointer-events:none}
        .theme-grid{display:flex;flex-direction:column;gap:5px}
        .theme-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
        .theme-item:hover{border-color:var(--border-active);background:var(--card-hover)}.theme-item.done{opacity:.5}.theme-item.done .theme-title{text-decoration:line-through}
        .theme-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--text-muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:9px;font-weight:800}
        .theme-check.done{background:var(--green);border-color:var(--green);color:#000}
        .theme-icon{font-size:18px;flex-shrink:0}.theme-info{flex:1;min-width:0}
        .theme-title{font-size:12px;font-weight:600;line-height:1.3}
        .theme-sub{font-size:10px;color:var(--ar);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .theme-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--violet-bg);color:var(--violet);flex-shrink:0}
        .detail-view{display:none}.detail-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
        .detail-back{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px}
        .detail-back:hover{color:var(--text)}.detail-title-de{font-size:15px;font-weight:700;flex:1;line-height:1.3}
        .detail-title-ar{font-size:12px;color:var(--ar);margin-top:-2px}
        .section{margin-bottom:14px}
        .section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px}
        .de-text{font-size:12px;color:var(--text);line-height:1.7;background:var(--bg2);padding:12px 14px;border-radius:var(--radius-sm)}
        .ar-text{font-size:11px;color:var(--ar);line-height:1.6;background:var(--ar-bg);padding:8px 14px;margin-top:4px;border-radius:var(--radius-sm)}
        .arg-list{display:flex;flex-direction:column;gap:4px}
        .arg-card{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;border-left:3px solid var(--gold)}
        .arg-card .de-arg{font-size:12px;line-height:1.5}
        .arg-card .ar-arg{font-size:11px;color:var(--ar);margin-top:3px;line-height:1.4}
        .arg-card.pro{border-left-color:var(--green)}.arg-card.contra{border-left-color:var(--red)}
        .vocab-list{list-style:none}
        .vocab-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:3px}
        .vocab-de{font-weight:600;font-size:12px}.vocab-ar{color:var(--ar);font-size:11px}
        .phrase-item{font-size:11px;color:var(--text-dim);line-height:1.6;padding:6px 10px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:3px}
        .phrase-item .de-phrase{color:var(--text)}
        .phrase-item .ar-phrase{color:var(--ar);font-size:10px;margin-top:2px}
        .ps-card{background:var(--blue-bg);border:1px solid rgba(96,165,250,0.2);border-radius:var(--radius-sm);padding:12px;margin-bottom:6px}
        .ps-title-de{font-size:12px;font-weight:700;color:var(--text)}
        .ps-title-ar{font-size:11px;color:var(--ar);margin-top:2px}
        .ps-text-de{font-size:11px;color:var(--text-dim);line-height:1.5;margin-top:6px}
        .ps-text-ar{font-size:10px;color:var(--ar);line-height:1.5;margin-top:3px}
        .idea-item{font-size:11px;padding:5px 10px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:2px;color:var(--text-dim)}
        .idea-item .de-idea{color:var(--text)}
        .idea-item .ar-idea{color:var(--ar);font-size:10px;margin-top:1px}
        .qa-area{margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
        .qa-area summary{cursor:pointer;font-size:12px;font-weight:700;color:var(--gold);padding:6px 0;user-select:none}
        .qa-input-wrap{display:flex;gap:6px;margin-top:8px}
        .qa-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:12px;padding:9px 12px;outline:none}
        .qa-input:focus{border-color:var(--gold)}.qa-btn{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);padding:9px 16px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
        .qa-btn:hover{filter:brightness(1.1)}
        .qa-answer{margin-top:6px;padding:10px 12px;background:var(--violet-bg);border-radius:var(--radius-sm);font-size:12px;line-height:1.6;display:none}
        .qa-answer.show{display:block}
        .qa-hint{font-size:10px;color:var(--text-muted);margin-top:4px}
        .qa-question{font-size:11px;color:var(--text-dim);margin-top:6px}
        .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px}
        .empty-state .big{font-size:36px;margin-bottom:10px}
        .exam-btn{font-size:9px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
        .exam-btn:hover{background:var(--card-hover);color:var(--text)}
        .exam-btn.on{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
        .exam-hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--gold-bg);border:1px solid rgba(245,158,11,0.3);padding:8px 16px;border-radius:999px;font-size:10px;color:var(--gold);font-weight:600;pointer-events:none;z-index:10;display:none;backdrop-filter:blur(8px)}
        .exam-hint.show{display:block}
        .redemittel-grid{display:flex;flex-direction:column;gap:12px}
        .redemittel-cat-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gold);margin-bottom:6px}
        .redemittel-cat-title .ar-cat{color:var(--ar);text-transform:none;letter-spacing:0;font-size:10px;margin-left:6px}
        .redemittel-item{padding:6px 10px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:3px;font-size:11px;color:var(--text-dim);line-height:1.5}
        .redemittel-item .de-rm{color:var(--text)}
        .redemittel-item .ar-rm{color:var(--ar);font-size:10px;margin-top:2px}
        .exam-section{display:flex;flex-direction:column;gap:10px}
        .exam-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
        .exam-word{font-size:20px;font-weight:800;margin-bottom:8px}
        .exam-trans{font-size:14px;color:var(--ar);margin-bottom:12px;display:none}
        .exam-trans.show{display:block}
        .exam-options{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
        .exam-opt{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-family:inherit;font-size:12px;color:var(--text);cursor:pointer;transition:all .15s}
        .exam-opt:hover{background:var(--card-hover);border-color:var(--gold)}
        .exam-opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
        .exam-opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
        .exam-opt:disabled{cursor:default;opacity:.7}
        .exam-score{font-size:11px;color:var(--text-muted);margin-top:8px}
        .exam-progress{height:4px;background:var(--bg2);border-radius:2px;margin-bottom:12px;overflow:hidden}
        .exam-progress-bar{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
        .exam-source{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
        .exam-source button{font-size:9px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:600}
        .exam-source button.active{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
        .exam-source button:hover{background:var(--card-hover)}
        .myvocab-input{display:flex;gap:6px;margin-bottom:10px}
        .myvocab-input input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:12px;padding:8px 10px;outline:none}
        .myvocab-input input:focus{border-color:var(--gold)}
        .myvocab-list{display:flex;flex-direction:column;gap:4px}
        .myvocab-item{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border-radius:var(--radius-sm);padding:8px 10px}
        .myvocab-item .vw-de{font-weight:600;font-size:12px}
        .myvocab-item .vw-ar{color:var(--ar);font-size:11px}
        .myvocab-item .vw-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px}
        .myvocab-count{font-size:10px;color:var(--text-muted);margin-bottom:8px}
        .add-btn{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
        .add-btn:hover{filter:brightness(1.1)}
        .section-title{cursor:pointer;user-select:none}
        .section-title .toggle-icon{display:inline-block;transition:transform .2s;margin-right:3px;font-size:9px}
        .section-title .toggle-icon.open{transform:rotate(90deg)}
        .section-content{display:none}
        .section-content.open{display:block}
        .save-section-btn{font-size:9px;padding:2px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;margin-left:8px;transition:all .15s;font-weight:600}
        .save-section-btn:hover{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-dim)}
        .vocab-save{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 6px;transition:color .15s}
        .vocab-save:hover{color:var(--green)}
        .review-card{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--violet)}
        .review-card .rc-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--violet);margin-bottom:3px}
        .review-card .rc-text{font-size:11px;color:var(--text-dim);line-height:1.5}
        .review-card .rc-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;float:right;padding:0 4px}
        .review-tabs{display:flex;gap:3px;margin-bottom:10px;background:var(--bg2);border-radius:var(--radius-sm);padding:3px}
        .review-tab{flex:1;padding:6px 4px;text-align:center;border:none;background:transparent;color:var(--text-muted);font-family:inherit;font-size:10px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s}
        .review-tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
        .vocab-cat{margin-bottom:10px}
        .vocab-cat-header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
        .vocab-cat-header:hover{border-color:var(--border-active)}
        .vocab-cat-header .vcat-icon{font-size:16px}
        .vocab-cat-header .vcat-title{font-size:11px;font-weight:600;flex:1}
        .vocab-cat-header .vcat-count{font-size:9px;color:var(--text-muted)}
        .vocab-cat-header .vcat-arrow{font-size:9px;color:var(--text-muted);transition:transform .2s}
        .vocab-cat-header.open .vcat-arrow{transform:rotate(90deg)}
        .vocab-cat-body{display:none;margin-top:4px;padding-left:4px}
        .vocab-cat-body.open{display:block}
        .vword{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:4px;border-left:3px solid var(--violet)}
        .vword .vw-de{font-size:12px;font-weight:700;color:var(--text)}
        .vword .vw-ar{font-size:11px;color:var(--ar);margin-top:1px}
        .vword .vw-ctx{font-size:10px;color:var(--text-muted);margin-top:4px;font-style:italic;line-height:1.4}
        .vword .vw-ex{font-size:11px;color:var(--text-dim);margin-top:3px;line-height:1.4;padding:6px 8px;background:var(--card);border-radius:4px}
        .vword .vw-ex-ar{font-size:10px;color:var(--ar);margin-top:2px;line-height:1.3}
        @media(max-width:480px){.app{padding:10px 6px 80px}.stats-row{grid-template-columns:repeat(2,1fr)}.tab{font-size:9px;min-width:42px;padding:9px 2px}.tabs{padding:3px;gap:1px}.stat{padding:6px 2px}.stat-num{font-size:14px}.theme-item{padding:10px}.theme-title{font-size:11px}.section-title{font-size:9px}.de-text{font-size:11px;padding:10px 12px}.detail-title-de{font-size:14px}}
    </style>
</head>
<body>
<div class="app" id="app">
    <header class="header">
        <div>
            <div class="logo">B2 <span>Prüfung</span> &nbsp;<span style="font-weight:400;font-size:12px">🇩🇪 + 🇸🇦</span></div>
            <div class="logo-sub">Inhalt · Meinung · Erfahrung · Quiz</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
            <button class="exam-btn" id="examBtn" onclick="toggleExam()">🎯 Prüfung</button>
            <span class="badge" id="countDone">0/38</span>
        </div>
    </header>
    <div class="stats-row">
        <div class="stat"><div class="stat-num" style="color:var(--gold)" id="statLearned">0</div><div class="stat-label">Gelernt</div></div>
        <div class="stat"><div class="stat-num" style="color:var(--violet)" id="statVocab">0</div><div class="stat-label">Vokabeln</div></div>
        <div class="stat"><div class="stat-num" style="color:var(--blue)" id="statPhrases">0</div><div class="stat-label">Sätze</div></div>
        <div class="stat"><div class="stat-num" style="color:var(--green)" id="statStreak">0</div><div class="stat-label">Serie</div></div>
    </div>
    <div class="tabs" id="mainTabs">
        <button class="tab active" data-tab="themes" onclick="switchTab('themes')">📚 Themen</button>
        <button class="tab" data-tab="problems" onclick="switchTab('problems')">💡 Problemlösung</button>
        <div class="tab-group-divider"></div>
        <button class="tab" data-tab="phrases" onclick="switchTab('phrases')">🗣️ Redemittel</button>
        <button class="tab" data-tab="myvocab" onclick="switchTab('myvocab')">📝 Meine Vokabeln</button>
        <button class="tab" data-tab="quiz" onclick="switchTab('quiz')">🧠 Quiz</button>
        <button class="tab" data-tab="vocab" onclick="switchTab('vocab')">🗂️ Wortschatz</button>
    </div>
    <div class="search-wrap" id="searchWrap">
        <span class="search-icon">🔍</span>
        <input id="searchInput" placeholder="Suchen..." oninput="filterThemes()">
    </div>
    <div id="themeListView"><div class="theme-grid" id="themeGrid"></div></div>
    <div class="detail-view" id="detailView">
        <div class="detail-header">
            <button class="detail-back" onclick="closeDetail()">←</button>
            <div>
                <div class="detail-title-de" id="detailTitleDe"></div>
                <div class="detail-title-ar" id="detailTitleAr"></div>
            </div>
            <div class="theme-check" id="detailCheck" onclick="toggleDone()"></div>
        </div>
        <div id="detailContent"></div>
    </div>
</div>
<div class="exam-hint" id="examHint">🎯 Prüfungsmodus aktiv – Arabisch versteckt. Klick nochmal zum Anzeigen.</div>
<script>
// ============================================================
// MEINUNG + ERFAHRUNG Data (added as patch to keep b2-data.js clean)
// ============================================================
const THEME_EXTRA = {
1:{meinungDe:"Ich finde die Kinderuniversität sinnvoll, weil sie Kinder früh an Wissenschaft heranführt. Allerdings sollte Bewegung und Freizeit nicht zu kurz kommen.",meinungAr:"أجد جامعة الأطفال مفيدة لأنها تقرب الأطفال من العلم مبكراً. لكن يجب ألا تقل أهمية الرياضة والترفيه.",erfahrungDe:"Mein Neffe war einmal in einem Kinderuni-Kurs zum Thema Weltall und war total begeistert. Er wollte danach Astronaut werden.",erfahrungAr:"شارك ابن أختي مرة في دورة أطفال عن الفضاء وكان متحمساً جداً. أراد بعدها أن يصبح رائد فضاء."},

        if (e) { t.meinungDe = e.meinungDe; t.meinungAr = e.meinungAr; t.erfahrungDe = e.erfahrungDe; t.erfahrungAr = e.erfahrungAr; }
    });
}

let state = {
    done: JSON.parse(localStorage.getItem('b2_done') || '[]'),
    tab: 'themes',
    currentTheme: null,
    exam: localStorage.getItem('b2_exam') === '1',
    myVocab: JSON.parse(localStorage.getItem('b2_myvocab') || '[]'),
    savedSections: JSON.parse(localStorage.getItem('b2_savedSections') || '[]'),
    quiz: { source: 'all', idx: 0, correct: 0, total: 0, pool: [], answered: false }
};
function saveDone() { localStorage.setItem('b2_done', JSON.stringify(state.done)); }
function saveMyVocab() { localStorage.setItem('b2_myvocab', JSON.stringify(state.myVocab)); }
function saveMySections() { localStorage.setItem('b2_savedSections', JSON.stringify(state.savedSections)); }
function toggleExam() {
    state.exam = !state.exam;
    localStorage.setItem('b2_exam', state.exam ? '1' : '0');
    document.getElementById('examBtn').classList.toggle('on', state.exam);
    document.getElementById('examHint').classList.toggle('show', state.exam);
    if (state.currentTheme) openTheme(state.currentTheme.id);
}
function em() { return state.exam; }
function toggleSection(el) {
    const icon = el.querySelector('.toggle-icon');
    const content = el.parentElement.querySelector('.section-content');
    if (content) { content.classList.toggle('open'); if(icon) icon.classList.toggle('open'); }
}
function saveVocabFromTheme(de, ar, btn) {
    if (state.myVocab.some(v => v.de === de && v.ar === ar)) return;
    state.myVocab.push({de, ar});
    saveMyVocab();
    updateStats();
    btn.textContent = '✓'; btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = '+'; btn.style.color = ''; }, 1500);
}
function saveSectionFromTheme(sectionId, themeId) {
    const t = THEMES.find(x => x.id === themeId); if (!t) return;
    const map = {
        inhalt: { title: t.icon+' Inhalt', text: t.textDe, ar: t.textAr },
        meinung: { title: t.icon+' Meinung', text: t.meinungDe, ar: t.meinungAr },
        erfahrung: { title: t.icon+' Erfahrung', text: t.erfahrungDe, ar: t.erfahrungAr }
    };
    const item = map[sectionId]; if (!item || !item.text) return;
    const key = themeId+'_'+sectionId;
    if (state.savedSections.some(s => s.key === key)) return;
    state.savedSections.push({ key, themeId, sectionId, title: item.title, text: item.text, ar: item.ar });
    saveMySections();
    updateStats();
    const btn = document.getElementById('saveSec_'+sectionId);
    if (btn) { btn.textContent = '✓'; btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green)';
        setTimeout(() => { btn.textContent = '📋'; btn.style.color = ''; btn.style.borderColor = ''; }, 1500); }
}

    document.getElementById('detailView').style.display = 'none';

function langSpan(de, ar){

}
function argCard(cls, de, ar){

}
function phraseBlock(de, ar){

function ideaBlock(de, ar){

function render() {

function updateStats() {
    document.getElementById('statLearned').textContent = state.done.length;

    let tv = 0; THEMES.forEach(t => { if(t.vocab) tv += t.vocab.length; });

    let tp = 0; REDEMITTEL.forEach(c => tp += c.items.length);

function renderThemes() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = THEMES.filter(t => t.titleDe.toLowerCase().includes(q) || t.titleAr.toLowerCase().includes(q));
    const grid = document.getElementById('themeGrid');
    if (!filtered.length) { grid.innerHTML = '<div class="empty-state"><div class="big">🔍</div>Kein Thema gefunden.</div>'; return; }

        const done = state.done.includes(t.id);
        return `<div class="theme-item ${done?'done':''}" onclick="openTheme(${t.id})">
            <div class="theme-check ${done?'done':''}" onclick="event.stopPropagation();toggleDone(${t.id})">${done?'✓':''}</div>
            <div class="theme-icon">${t.icon}</div>

            <div class="theme-tag">${t.id}</div>
        </div>`;
    }).join('');
}
function renderProblems() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = THEMES.filter(t => t.problem && (t.problem.titleDe.toLowerCase().includes(q) || t.problem.titleAr.toLowerCase().includes(q)));
    const grid = document.getElementById('themeGrid');
    if (!filtered.length) { grid.innerHTML = '<div class="empty-state"><div class="big">💡</div>Keine Aufgabe gefunden.</div>'; return; }
    grid.innerHTML = filtered.map(t =>
        `<div class="theme-item" onclick="openProblem(${t.id})">
            <div class="theme-icon">${t.icon}</div>
            <div class="theme-info"><div class="theme-title">${t.problem.titleDe}</div><div class="theme-sub">${t.titleDe}</div></div>
        </div>`
    ).join('');
}
function renderPhrases() {
    const grid = document.getElementById('themeGrid');
    let html = '<div class="redemittel-grid">';
    REDEMITTEL.forEach((cat, i) => {
        const ac = REDEMITTEL_AR[i];
        html += `<div><div class="redemittel-cat-title">${cat.cat}${em()?'':' <span class="ar-cat">('+ac.cat+')</span>'}</div>`;
        cat.items.forEach((item, j) => { html += phraseBlock(item, ac.items[j]); });
        html += `</div>`;
    });

function collapsibleSection(title, content, sectionId, themeId) {
    const saveBtn = sectionId ? `<span class="save-section-btn" id="saveSec_${sectionId}" onclick="event.stopPropagation();saveSectionFromTheme('${sectionId}',${themeId})">📋</span>` : '';
    return `<div class="section collapsible">
        <div class="section-title" onclick="toggleSection(this)">
            <span class="toggle-icon">▶</span> ${title}${saveBtn}
        </div>
        <div class="section-content">${content}</div>
    </div>`;
}
function openTheme(id) {
    const t = THEMES.find(x => x.id === id);
    if (!t) return;
    state.currentTheme = t;
    document.getElementById('themeListView').style.display = 'none';
    document.getElementById('detailView').style.display = 'block';
    document.getElementById('detailTitleDe').textContent = t.icon + ' ' + t.titleDe;
    document.getElementById('detailTitleAr').textContent = t.titleAr;
    const chk = document.getElementById('detailCheck');
    chk.className = 'theme-check' + (state.done.includes(t.id) ? ' done' : '');
    chk.textContent = state.done.includes(t.id) ? '✓' : '';
    let html = '';
    // Text
    html += collapsibleSection('📄 Inhalt', langSpan(t.textDe, t.textAr), 'inhalt', t.id);
    // Meinung
    if (t.meinungDe) {
        html += collapsibleSection('💬 Meinung', langSpan(t.meinungDe, t.meinungAr), 'meinung', t.id);
    }
    // Erfahrung
    if (t.erfahrungDe) {
        html += collapsibleSection('📖 Erfahrung', langSpan(t.erfahrungDe, t.erfahrungAr), 'erfahrung', t.id);
    }
    // Vocab
    if (t.vocab && t.vocab.length) {
        let vh = '<ul class="vocab-list">';
        t.vocab.forEach(v => {
            const saved = state.myVocab.some(s => s.de === v.de && s.ar === v.ar);
            vh += `<li class="vocab-item"><span class="vocab-de">${v.de}</span>${em()?'':'<span class="vocab-ar">'+v.ar+'</span>'}<button class="vocab-save" onclick="saveVocabFromTheme('${v.de.replace(/'/g,"\\'")}','${v.ar.replace(/'/g,"\\'")}',this)" ${saved?'disabled':''}>${saved?'✓':'+'}</button></li>`;
        });
        vh += '</ul>';
        html += collapsibleSection('📝 Wortschatz', vh);
    }
    // Pro
    if (t.proDe && t.proDe.length) {
        let ph = '<div class="arg-list">';
        t.proDe.forEach((a, i) => { ph += argCard('pro', a, t.proAr[i]); });
        ph += '</div>';
        html += collapsibleSection('✅ Pro-Argumente', ph);
    }
    // Contra
    if (t.contraDe && t.contraDe.length) {
        let ch = '<div class="arg-list">';
        t.contraDe.forEach((a, i) => { ch += argCard('contra', a, t.contraAr[i]); });
        ch += '</div>';
        html += collapsibleSection('❌ Contra-Argumente', ch);
    }
    // Phrases
    if (t.phrasesDe && t.phrasesDe.length) {
        let rh = '';
        t.phrasesDe.forEach((p, i) => { rh += phraseBlock(p, t.phrasesAr[i]); });
        html += collapsibleSection('💬 Redemittel', rh);
    }
    // Problem
    if (t.problem) {
        let ph = '';
        if(em()){
            ph += `<div class="ps-card"><div class="ps-title-de">${t.problem.titleDe}</div><div class="ps-text-de">${t.problem.textDe}</div></div>`;
        } else {
            ph += `<div class="ps-card"><div class="ps-title-de">${t.problem.titleDe}</div><div class="ps-title-ar">${t.problem.titleAr}</div><div class="ps-text-de">${t.problem.textDe}</div><div class="ps-text-ar">${t.problem.textAr}</div></div>`;
        }
        if (t.problemIdeasDe) {
            if(!em()) ph += `<div style="font-size:10px;color:var(--text-muted);font-weight:600;margin:6px 0 4px">Ideen / الأفكار:</div>`;
            t.problemIdeasDe.forEach((idea, i) => { ph += ideaBlock(idea, t.problemIdeasAr[i]); });
        }
        html += collapsibleSection('🧩 Problemlösung', ph);
    }
    // Q&A
    html += `<div class="qa-area"><details><summary>💡 Frage zu diesem Thema stellen</summary>
        <div class="qa-input-wrap">
            <input class="qa-input" id="qaInput" placeholder="z.B. Pro?, Contra?, Vokabeln?, Meinung?" onkeydown="if(event.key==='Enter')askQuestion()">
            <button class="qa-btn" onclick="askQuestion()">Fragen</button>
        </div>
        <div class="qa-hint">💡 Pro / Contra / Vokabeln / Meinung / Text / Lösung</div>
        <div class="qa-question" id="qaQuestion"></div>
        <div class="qa-answer" id="qaAnswer"></div>
    </details></div>`;
    document.getElementById('detailContent').innerHTML = html;
}

function toggleDone(id) {
    const tid = id || (state.currentTheme && state.currentTheme.id);
    if (!tid) return;
    const idx = state.done.indexOf(tid);
    if (idx > -1) state.done.splice(idx, 1); else state.done.push(tid);
    saveDone();
    if (id) render();
    else if (state.currentTheme) {
        const chk = document.getElementById('detailCheck');
        chk.className = 'theme-check' + (state.done.includes(tid) ? ' done' : '');
        chk.textContent = state.done.includes(tid) ? '✓' : '';
    }
    updateStats();

// Q&A
// ============================================================
function askQuestion() {
    const input = document.getElementById('qaInput');
    const q = input.value.trim();
    if (!q) return;
    const t = state.currentTheme;
    const ql = q.toLowerCase();
    let answer = '';
    if (ql.includes('text')||ql.includes('inhalt')||ql.includes('worüber')||ql.includes('zusammenfass'))
        answer = em() ? `Text: ${t.textDe}` : `Text: ${t.textDe} / ${t.textAr}`;
    else if (ql.includes('pro')||ql.includes('vorteil')||ql.includes('dafür'))
        answer = 'Pro: '+(t.proDe||[]).join(' • ');
    else if (ql.includes('contra')||ql.includes('nachteil')||ql.includes('dagegen'))
        answer = 'Contra: '+(t.contraDe||[]).join(' • ');
    else if (ql.includes('vokabel')||ql.includes('wort'))
        answer = 'Vokabeln: '+(t.vocab||[]).map(v=>v.de+(em()?'':' ('+v.ar+')')).join(', ');
    else if (ql.includes('meinung')||ql.includes('findest')||ql.includes('denkst'))
        answer = t.meinungDe || 'Keine Meinung verfügbar.';
    else if (ql.includes('erfahrung')||ql.includes('erlebnis'))
        answer = t.erfahrungDe || 'Keine Erfahrung verfügbar.';
    else if (ql.includes('redemittel')||ql.includes('satz')||ql.includes('phras'))
        answer = 'Redemittel: '+(t.phrasesDe||[]).join(' • ');
    else if (ql.includes('lösung')||ql.includes('aufgabe')||ql.includes('ideen'))
        answer = t.problem ? `Aufgabe: ${t.problem.titleDe}. Ideen: ${(t.problemIdeasDe||[]).join(', ')}` : 'Keine Aufgabe.';
    else if (ql.includes('übersetz')||ql.includes('bedeutet')||ql.includes('was heißt')||ql.includes('arabisch')) {
        const words = ql.replace(/[?.,!]/g,'').split(' ');
        let found = [];
        (t.vocab||[]).forEach(v => { words.forEach(w=>{ if(w.length>3&&(v.de.toLowerCase().includes(w)||v.ar.toLowerCase().includes(w))) found.push(v); }); });
        answer = found.length ? found.map(v=>`${v.de} = ${v.ar}`).join('\n') : 'Nicht gefunden.';
    } else {
        const a = [];
        if (t.proDe&&t.proDe.length) a.push('Pro: '+t.proDe[0]);
        if (t.contraDe&&t.contraDe.length) a.push('Contra: '+t.contraDe[0]);
        if (t.vocab&&t.vocab.length) a.push('Vokabel: '+t.vocab[0].de+(em()?'':' = '+t.vocab[0].ar));
        answer = a.length ? a.join('. ')+'. Frag mich zu Pro, Contra, Vokabeln, Meinung oder Erfahrung!' : 'Frag mich zu diesem Thema!';
    }
    document.getElementById('qaQuestion').textContent = 'Frage: '+q;
    const ans = document.getElementById('qaAnswer');
    ans.textContent = answer; ans.classList.add('show');
    const d = ans.closest('details'); if(d) d.open = true;
}

// QUIZ
// ============================================================
function initQuiz() {
    state.quiz.idx = 0; state.quiz.correct = 0; state.quiz.total = 0;
    state.quiz.answered = false; state.quiz.source = 'all';
    buildQuizPool();
}
function buildQuizPool() {
    const p = [];
    if (state.quiz.source === 'all') {
        THEMES.forEach(t => { if(t.vocab) t.vocab.forEach(v => p.push(v)); });
    } else if (state.quiz.source === 'my') {
        state.myVocab.forEach(v => p.push(v));
    }
    if (!p.length) {
        document.getElementById('themeGrid').innerHTML = '<div class="empty-state"><div class="big">🧠</div>Keine Vokabeln fürs Quiz. Füge eigene hinzu oder öffne ein Thema.</div>';
        return;
    }
    // Shuffle
    for (let i = p.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [p[i], p[j]] = [p[j], p[i]]; }
    state.quiz.pool = p.slice(0, 20);
    renderQuiz();
}
function setQuizSource(src) {
    state.quiz.source = src;
    document.querySelectorAll('.exam-source button').forEach(b => b.classList.toggle('active', b.dataset.src === src));
    buildQuizPool();
}
function renderQuiz() {
    const grid = document.getElementById('themeGrid');
    const pool = state.quiz.pool;
    if (!pool.length) { grid.innerHTML = '<div class="empty-state"><div class="big">🧠</div>Keine Vokabeln. Füge eigene hinzu!</div>'; return; }
    const idx = state.quiz.idx;
    if (idx >= pool.length) {
        const score = Math.round((state.quiz.correct / state.quiz.total) * 100);
        grid.innerHTML = `<div class="exam-card">
            <div class="big" style="font-size:40px">🎉</div>
            <div style="font-size:18px;font-weight:800;margin:8px 0">Quiz beendet!</div>
            <div style="font-size:14px;color:var(--text-dim)">${state.quiz.correct} / ${state.quiz.total} richtig (${score}%)</div>

        </div>`;
        return;
    }
    const word = pool[idx];
    // Generate wrong options
    let wrong = [];
    const allPool = [...THEMES.flatMap(t => t.vocab || []), ...state.myVocab];
    const shuffled = [...allPool].sort(() => Math.random() - 0.5);
    for (const w of shuffled) {
        if (w.de !== word.de && !wrong.includes(w.ar) && wrong.length < 3) wrong.push(w.ar);
    }
    while (wrong.length < 3) wrong.push('???');
    // Options (correct + 3 wrong, shuffled)
    const opts = [{text: word.ar, correct: true}, ...wrong.map(w => ({text: w, correct: false}))];
    for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [opts[i], opts[j]] = [opts[j], opts[i]]; }
    const progress = ((idx) / pool.length) * 100;
    grid.innerHTML = `
    <div class="exam-source">
        <button data-src="all" class="active" onclick="setQuizSource('all')">📚 Alle Themen</button>
        <button data-src="my" onclick="setQuizSource('my')">📝 Meine Vokabeln</button>
    </div>
    <div class="exam-progress"><div class="exam-progress-bar" style="width:${progress}%"></div></div>
    <div class="exam-card">
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px">${idx+1} / ${pool.length}</div>
        <div class="exam-word">${word.de}</div>
        <div class="exam-trans ${state.quiz.answered?'show':''}">${word.ar}</div>
        <div class="exam-options">`;
    opts.forEach((o, i) => {
        const cls = state.quiz.answered ? (o.correct ? 'correct' : '') : '';
        grid.innerHTML += `<button class="exam-opt ${cls}" onclick="answerQuiz(${i},${o.correct})" ${state.quiz.answered?'disabled':''}>${o.text}</button>`;
    });
    grid.innerHTML += `</div>
        <div class="exam-score">✅ ${state.quiz.correct} / ${state.quiz.total}</div>
        <div style="margin-top:8px"><button class="add-btn" onclick="nextQuiz()" style="${state.quiz.answered?'':'display:none'}">➡️ Nächste</button></div>
    </div>`;
}
function answerQuiz(optIdx, correct) {
    if (state.quiz.answered) return;
    state.quiz.answered = true;
    state.quiz.total++;
    if (correct) state.quiz.correct++;
    renderQuiz();
}
function nextQuiz() {
    state.quiz.idx++;
    state.quiz.answered = false;
    renderQuiz();
}

let vocabCatOpen = {};
function renderVocab() {
    const grid = document.getElementById('themeGrid');
    let html = '<div class="vocab-list">';
    B2_VOCAB.forEach((cat, ci) => {
        const isOpen = vocabCatOpen[ci] || false;
        html += `<div class="vocab-cat">
            <div class="vocab-cat-header ${isOpen?'open':''}" onclick="toggleVocabCat(${ci})">
                <span class="vcat-icon">${cat.icon}</span>
                <span class="vcat-title">${cat.cat} <span style="color:var(--ar);font-weight:400">(${cat.catAr})</span></span>
                <span class="vcat-count">${cat.words.length}</span>
                <span class="vcat-arrow">▶</span>
            </div>
            <div class="vocab-cat-body ${isOpen?'open':''}">`;
        if (em()) {
            cat.words.forEach(w => { html += `<div class="vword"><div class="vw-de">${w.de}</div><div class="vw-ctx">📌 ${w.ctx}</div><div class="vw-ex">💬 ${w.ex}</div></div>`; });
        } else {
            cat.words.forEach(w => {
                html += `<div class="vword"><div class="vw-de">${w.de}</div><div class="vw-ar">${w.ar}</div>
                    <div class="vw-ctx">📌 ${w.ctx} / ${w.ctxAr}</div>
                    <div class="vw-ex">💬 ${w.ex}</div><div class="vw-ex-ar">${w.exAr}</div></div>`;
            });
        }
        html += `</div></div>`;
    });
    html += '</div>';
    grid.innerHTML = html;
}
function toggleVocabCat(ci) {
    vocabCatOpen[ci] = !vocabCatOpen[ci];
    renderVocab();
}
