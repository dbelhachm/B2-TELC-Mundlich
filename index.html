<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2 Mündliche Prüfung – Deutsch & Arabisch</title>
    <script src="b2-data.js"></script>
<script src="exam-texts.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#0c0c14;--bg2:#161622;--bg3:#1e1e32;
            --card:#1a1a2e;--card-hover:#222238;
            --border:rgba(255,255,255,0.06);--border-active:rgba(251,191,36,0.3);
            --text:#e8e8f0;--text-dim:#9999bb;--text-muted:#666688;
            --gold:#f59e0b;--gold-dim:rgba(245,158,11,0.25);--gold-bg:rgba(245,158,11,0.1);
            --green:#34d399;--green-bg:rgba(52,211,153,0.15);
            --red:#f87171;--red-bg:rgba(248,113,113,0.15);
            --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.15);
            --violet:#a78bfa;--violet-bg:rgba(167,139,250,0.15);
            --ar:#94a3b8;--ar-bg:rgba(148,163,184,0.08);
            --radius:12px;--radius-sm:8px;
            --shadow:0 8px 40px rgba(0,0,0,0.5);
        }
        html,body{height:100%}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased}
        .app{width:100%;max-width:640px;padding:16px 12px 100px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .logo{font-size:18px;font-weight:800}.logo span{color:var(--gold)}
        .logo-sub{font-size:9px;color:var(--text-muted);font-weight:500;margin-top:-1px}
        .badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--gold-bg);color:var(--gold);border:1px solid rgba(245,158,11,0.2)}
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
        .stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 4px;text-align:center}
        .stat-num{font-size:16px;font-weight:800;line-height:1.2}
        .stat-label{font-size:7px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
        .tabs{display:flex;gap:2px;margin-bottom:10px;background:var(--bg2);border-radius:var(--radius);padding:4px;flex-wrap:wrap}
        .tab{flex:1;min-width:50px;padding:10px 3px;text-align:center;border:none;background:transparent;color:var(--text-muted);font-family:inherit;font-size:10px;font-weight:700;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;line-height:1.2}
        .tab:hover{color:var(--text-dim)}
        .tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 12px rgba(0,0,0,.3)}
        .tab[data-tab="themes"].active{color:var(--gold);border-bottom:2px solid var(--gold);border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(245,158,11,0.08)}
        .tab[data-tab="problems"].active{color:var(--blue);border-bottom:2px solid var(--blue);border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(96,165,250,0.08)}
        .tab-group-divider{width:1px;background:var(--border);margin:6px 2px;flex-shrink:0}
        .tab[data-tab="phrases"].active{color:var(--violet);border-bottom:2px solid var(--violet);border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(167,139,250,0.08)}
        .tab[data-tab="myvocab"].active{color:var(--green);border-bottom:2px solid var(--green);border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(52,211,153,0.08)}
        .tab[data-tab="quiz"].active{color:#f472b6;border-bottom:2px solid #f472b6;border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:rgba(244,114,182,0.08)}
        .search-wrap{position:relative;margin-bottom:10px}
        .search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:12px;padding:9px 12px 9px 34px;outline:none}
        .search-wrap input::placeholder{color:var(--text-muted)}.search-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
        .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px;pointer-events:none}
        .theme-grid{display:flex;flex-direction:column;gap:5px}
        .theme-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
        .theme-item:hover{border-color:var(--border-active);background:var(--card-hover)}.theme-item.done{opacity:.5}.theme-item.done .theme-title{text-decoration:line-through}
        .theme-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--text-muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:9px;font-weight:800}
        .theme-check.done{background:var(--green);border-color:var(--green);color:#000}
        .theme-icon{font-size:18px;flex-shrink:0}.theme-info{flex:1;min-width:0}
        .theme-title{font-size:12px;font-weight:600;line-height:1.3}
        .theme-sub{font-size:10px;color:var(--ar);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .theme-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--violet-bg);color:var(--violet);flex-shrink:0}
        .card-list{display:flex;flex-direction:column;gap:8px}
        .theme-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;cursor:pointer;transition:all .15s}
        .theme-card:hover{border-color:var(--border-active);background:var(--card-hover)}
        .tc-header{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;font-weight:600}
        .tc-ar{font-size:10px;color:var(--ar);font-weight:400}
        .tc-text{font-size:11px;color:var(--text-dim);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .detail-view{display:none}.detail-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
        .detail-back{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px}
        .detail-back:hover{color:var(--text)}.detail-title-de{font-size:15px;font-weight:700;flex:1;line-height:1.3}
        .detail-title-ar{font-size:12px;color:var(--ar);margin-top:-2px}
        .section{margin-bottom:14px}
        .section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px}
        .de-text{font-size:12px;color:var(--text);line-height:1.7;background:var(--bg2);padding:12px 14px;border-radius:var(--radius-sm)}
        .ar-text{font-size:11px;color:var(--ar);line-height:1.6;background:var(--ar-bg);padding:8px 14px;margin-top:4px;border-radius:var(--radius-sm)}
        .arg-list{display:flex;flex-direction:column;gap:4px}
        .arg-card{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;border-left:3px solid var(--gold)}
        .arg-card .de-arg{font-size:12px;line-height:1.5}
        .arg-card .ar-arg{font-size:11px;color:var(--ar);margin-top:3px;line-height:1.4}
        .arg-card.pro{border-left-color:var(--green)}.arg-card.contra{border-left-color:var(--red)}
        .vocab-list{list-style:none}
        .vocab-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:3px}
        .vocab-de{font-weight:600;font-size:12px}.vocab-ar{color:var(--ar);font-size:11px}
        .phrase-item{font-size:11px;color:var(--text-dim);line-height:1.6;padding:6px 10px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:3px}
        .phrase-item .de-phrase{color:var(--text)}
        .phrase-item .ar-phrase{color:var(--ar);font-size:10px;margin-top:2px}
        .ps-card{background:var(--blue-bg);border:1px solid rgba(96,165,250,0.2);border-radius:var(--radius-sm);padding:12px;margin-bottom:6px}
        .ps-title-de{font-size:12px;font-weight:700;color:var(--text)}
        .ps-title-ar{font-size:11px;color:var(--ar);margin-top:2px}
        .ps-text-de{font-size:11px;color:var(--text-dim);line-height:1.5;margin-top:6px}
        .ps-text-ar{font-size:10px;color:var(--ar);line-height:1.5;margin-top:3px}
        .idea-item{font-size:11px;padding:5px 10px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:2px;color:var(--text-dim)}
        .idea-item .de-idea{color:var(--text)}
        .idea-item .ar-idea{color:var(--ar);font-size:10px;margin-top:1px}
        .qa-area{margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
        .qa-area summary{cursor:pointer;font-size:12px;font-weight:700;color:var(--gold);padding:6px 0;user-select:none}
        .qa-input-wrap{display:flex;gap:6px;margin-top:8px}
        .qa-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:12px;padding:9px 12px;outline:none}
        .qa-input:focus{border-color:var(--gold)}.qa-btn{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);padding:9px 16px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
        .qa-btn:hover{filter:brightness(1.1)}
        .qa-answer{margin-top:6px;padding:10px 12px;background:var(--violet-bg);border-radius:var(--radius-sm);font-size:12px;line-height:1.6;display:none}
        .qa-answer.show{display:block}
        .qa-hint{font-size:10px;color:var(--text-muted);margin-top:4px}
        .qa-question{font-size:11px;color:var(--text-dim);margin-top:6px}
        .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px}
        .empty-state .big{font-size:36px;margin-bottom:10px}
        .exam-btn{font-size:9px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
        .exam-btn:hover{background:var(--card-hover);color:var(--text)}
        .exam-btn.on{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
        .exam-hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--gold-bg);border:1px solid rgba(245,158,11,0.3);padding:8px 16px;border-radius:999px;font-size:10px;color:var(--gold);font-weight:600;pointer-events:none;z-index:10;display:none;backdrop-filter:blur(8px)}
        .exam-hint.show{display:block}
        .redemittel-grid{display:flex;flex-direction:column;gap:12px}
        .redemittel-cat-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gold);margin-bottom:6px}
        .redemittel-cat-title .ar-cat{color:var(--ar);text-transform:none;letter-spacing:0;font-size:10px;margin-left:6px}
        .redemittel-item{padding:6px 10px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:3px;font-size:11px;color:var(--text-dim);line-height:1.5}
        .redemittel-item .de-rm{color:var(--text)}
        .redemittel-item .ar-rm{color:var(--ar);font-size:10px;margin-top:2px}
        .exam-section{display:flex;flex-direction:column;gap:10px}
        .exam-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
        .exam-word{font-size:20px;font-weight:800;margin-bottom:8px}
        .exam-trans{font-size:14px;color:var(--ar);margin-bottom:12px;display:none}
        .exam-trans.show{display:block}
        .exam-options{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
        .exam-opt{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-family:inherit;font-size:12px;color:var(--text);cursor:pointer;transition:all .15s}
        .exam-opt:hover{background:var(--card-hover);border-color:var(--gold)}
        .exam-opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
        .exam-opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
        .exam-opt:disabled{cursor:default;opacity:.7}
        .exam-score{font-size:11px;color:var(--text-muted);margin-top:8px}
        .exam-progress{height:4px;background:var(--bg2);border-radius:2px;margin-bottom:12px;overflow:hidden}
        .exam-progress-bar{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
        .exam-source{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
        .exam-source button{font-size:9px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:600}
        .exam-source button.active{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
        .exam-source button:hover{background:var(--card-hover)}
        .myvocab-input{display:flex;gap:6px;margin-bottom:10px}
        .myvocab-input input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:12px;padding:8px 10px;outline:none}
        .myvocab-input input:focus{border-color:var(--gold)}
        .myvocab-list{display:flex;flex-direction:column;gap:4px}
        .myvocab-item{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border-radius:var(--radius-sm);padding:8px 10px}
        .myvocab-item .vw-de{font-weight:600;font-size:12px}
        .myvocab-item .vw-ar{color:var(--ar);font-size:11px}
        .myvocab-item .vw-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px}
        .myvocab-count{font-size:10px;color:var(--text-muted);margin-bottom:8px}
        .add-btn{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
        .add-btn:hover{filter:brightness(1.1)}
        .section-title{cursor:pointer;user-select:none}
        .section-title .toggle-icon{display:inline-block;transition:transform .2s;margin-right:3px;font-size:9px}
        .section-title .toggle-icon.open{transform:rotate(90deg)}
        .section-content{display:none}
        .section-content.open{display:block}
        .save-section-btn{font-size:9px;padding:2px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;margin-left:8px;transition:all .15s;font-weight:600}
        .save-section-btn:hover{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-dim)}
        .vocab-save{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 6px;transition:color .15s}
        .vocab-save:hover{color:var(--green)}
        .review-card{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--violet)}
        .review-card .rc-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--violet);margin-bottom:3px}
        .review-card .rc-text{font-size:11px;color:var(--text-dim);line-height:1.5}
        .review-card .rc-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;float:right;padding:0 4px}
        .review-tabs{display:flex;gap:3px;margin-bottom:10px;background:var(--bg2);border-radius:var(--radius-sm);padding:3px}
        .review-tab{flex:1;padding:6px 4px;text-align:center;border:none;background:transparent;color:var(--text-muted);font-family:inherit;font-size:10px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s}
        .review-tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
        .vocab-cat{margin-bottom:10px}
        .vocab-cat-header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
        .vocab-cat-header:hover{border-color:var(--border-active)}
        .vocab-cat-header .vcat-icon{font-size:16px}
        .vocab-cat-header .vcat-title{font-size:11px;font-weight:600;flex:1}
        .vocab-cat-header .vcat-count{font-size:9px;color:var(--text-muted)}
        .vocab-cat-header .vcat-arrow{font-size:9px;color:var(--text-muted);transition:transform .2s}
        .vocab-cat-header.open .vcat-arrow{transform:rotate(90deg)}
        .vocab-cat-body{display:none;margin-top:4px;padding-left:4px}
        .vocab-cat-body.open{display:block}
        .vword{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:4px;border-left:3px solid var(--violet)}
        .vword .vw-de{font-size:12px;font-weight:700;color:var(--text)}
        .vword .vw-ar{font-size:11px;color:var(--ar);margin-top:1px}
        .vword .vw-ctx{font-size:10px;color:var(--text-muted);margin-top:4px;font-style:italic;line-height:1.4}
        .vword .vw-ex{font-size:11px;color:var(--text-dim);margin-top:3px;line-height:1.4;padding:6px 8px;background:var(--card);border-radius:4px}
        .vword .vw-ex-ar{font-size:10px;color:var(--ar);margin-top:2px;line-height:1.3}
        .cw{cursor:pointer;border-bottom:1px dashed rgba(255,255,255,0.15);transition:all .15s;display:inline}
        .cw:hover{color:var(--gold);border-bottom-color:var(--gold);background:rgba(245,158,11,0.06);border-radius:2px}
        .word-popup{position:fixed;background:var(--card);border:1px solid rgba(251,191,36,0.3);border-radius:var(--radius);padding:12px 14px;z-index:1000;box-shadow:0 8px 40px rgba(0,0,0,0.7);min-width:200px;max-width:280px;backdrop-filter:blur(12px);animation:fadeIn .15s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        .word-popup .wp-word{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-0.3px}
        .word-popup .wp-meaning{font-size:13px;color:var(--ar);margin-bottom:6px;line-height:1.4;padding:4px 0}
        .word-popup .wp-hint{font-size:10px;color:var(--text-muted);margin-bottom:6px;font-style:italic}
        .wp-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;padding-top:6px;border-top:1px solid var(--border)}
        .wp-btn{font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;white-space:nowrap}
        .wp-btn:hover{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-dim)}
        .wp-btn.playing{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
        .tts-btn{font-size:10px;padding:1px 7px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;margin-left:3px;transition:all .15s;line-height:1.6;font-weight:600}
        .tts-btn:hover{background:var(--green-bg);color:var(--green);border-color:rgba(52,211,153,0.3)}
        .tts-btn.playing{background:var(--green-bg);color:var(--green);border-color:var(--green);animation:ttsPulse .8s ease infinite}
        .play-all-btn{font-size:11px;padding:3px 9px;margin-left:3px}
        .voice-select{font-size:9px;padding:2px 5px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;max-width:100px;cursor:pointer;outline:none}
        .voice-select:hover{border-color:var(--border-active)}

        @keyframes ttsPulse{0%,100%{opacity:1}50%{opacity:0.5}}
        @media(max-width:480px){.app{padding:10px 6px 80px}.stats-row{grid-template-columns:repeat(2,1fr)}.tab{font-size:9px;min-width:42px;padding:9px 2px}.tabs{padding:3px;gap:1px}.stat{padding:6px 2px}.stat-num{font-size:14px}.theme-item{padding:10px}.theme-title{font-size:11px}.section-title{font-size:9px}.de-text{font-size:11px;padding:10px 12px}.detail-title-de{font-size:14px}.ar-text,.ar-arg,.ar-phrase,.ar-idea{font-size:9px}.tc-header{font-size:10px}.tc-text{font-size:10px}.ps-title-de{font-size:11px}.ps-title-ar{font-size:9px}.ps-text-de{font-size:10px}.ps-text-ar{font-size:9px}.vocab-de{font-size:10px}.vocab-ar{font-size:9px}}
    </style>
</head>
<body>
<div class="app" id="app">
    <header class="header">
        <div>
            <div class="logo">B2 <span>Prüfung</span> &nbsp;<span style="font-weight:400;font-size:12px">🇩🇪 + 🇸🇦</span></div>

<script>

const THEME_EXTRA = {
1:{meinungDe:"Ich finde die Kinderuniversität sinnvoll, weil sie Kinder früh an Wissenschaft heranführt. Allerdings sollte Bewegung und Freizeit nicht zu kurz kommen.",meinungAr:"أجد جامعة الأطفال مفيدة لأنها تقرب الأطفال من العلم مبكراً. لكن يجب ألا تقل أهمية الرياضة والترفيه.",erfahrungDe:"Mein Neffe war einmal in einem Kinderuni-Kurs zum Thema Weltall und war total begeistert. Er wollte danach Astronaut werden.",erfahrungAr:"شارك ابن أختي مرة في دورة أطفال عن الفضاء وكان متحمساً جداً. أراد بعدها أن يصبح رائد فضاء."},
2:{meinungDe:"Ich halte das Wohnen in einer WG im Alter für eine gute Alternative. Die Gemeinschaft beugt Einsamkeit vor. Niemand sollte aus Kostengründen in eine WG gesteckt werden.",meinungAr:"أرى العيش في WG في الكبر بديلاً جيداً. المجتمع يمنع الوحدة. لا ينبغي إجبار أحد على WG لأسباب مالية.",erfahrungDe:"Meine Großmutter ist mit 78 in eine WG gezogen. Anfangs skeptisch, heute genießt sie das gemeinsame Leben sehr.",erfahrungAr:"انتقلت جدتي إلى WG في 78. كانت متشككة في البداية، لكنها اليوم تستمتع بالحياة المشتركة."},
3:{meinungDe:"Fast Food ist in Maßen in Ordnung. Die Studie zeigt aber, wie gefährlich übermäßiger Konsum sein kann. Aufklärung über Ernährung ist wichtig.",meinungAr:"الوجبات السريعة مقبولة باعتدال. لكن الدراسة تظهر خطورة الاستهلاك المفرط. التوعية الغذائية مهمة.",erfahrungDe:"Früher aß ich mehrmals pro Woche Fast Food. Seit ich mich gesünder ernähre, fühle ich mich viel fitter.",erfahrungAr:"كنت أكل الوجبات السريعة عدة مرات أسبوعياً. منذ أن تحسنت تغذيتي، أشعر بلياقة أفضل."},
4:{meinungDe:"Englisch als Firmensprache ist praktisch, aber die Muttersprache der Mitarbeiter sollte nicht verschwinden. Denkmuster hängen eng mit Sprache zusammen.",meinungAr:"الإنجليزية كلغة شركات عملية، لكن اللغة الأم يجب ألا تختفي. أنماط التفكير مرتبطة باللغة.",erfahrungDe:"In meinem letzten Praktikum war Englisch die Firmensprache. Anfangs hatte ich Hemmungen, aber nach Wochen wurde es natürlich.",erfahrungAr:"في تدريبي السابق كانت الإنجليزية لغة الشركة. كنت خجولاً في البداية لكنه أصبح طبيعياً بعد أسابيع."},
5:{meinungDe:"Trinkgeld ist eine nette Geste, sollte aber freiwillig bleiben. 5-10% sind in Deutschland üblich. Es ist unfair, wenn Trinkgeld erwartet wird.",meinungAr:"الإكرامية لفتة جميلة لكن يجب أن تبقى اختيارية. 5-10% معتادة في ألمانيا. توقعها غير منصف.",erfahrungDe:"Als Kellner in Berlin war ich auf Trinkgeld angewiesen, weil der Grundlohn niedrig war. Wichtige Erfahrung.",erfahrungAr:"كنت أعتمد على الإكرامية كنادل في برلين لأن الراتب كان منخفضاً. تجربة مهمة."},
6:{meinungDe:"Blutspenden rettet Leben. Es ist schnell und unkompliziert. Mehr Menschen sollten sich trauen. Ich spende regelmäßig.",meinungAr:"التبرع بالدم ينقذ الأرواح. سريع وبسيط. يجب أن يتشجع المزيد. أتبرع بانتظام.",erfahrungDe:"Letztes Jahr spendete ich zum ersten Mal Blut. Ich war nervös, aber es tat nicht weh und das Team war nett.",erfahrungAr:"تبرعت بالدم لأول مرة السنة الماضية. كنت متوتراً لكنه لم يؤلم والفريق كان لطيفاً."},
7:{meinungDe:"Ich bin strikt gegen Rauchen. Es schadet dem Raucher und den Mitmenschen. Aufklärung in Schulen sollte früher beginnen.",meinungAr:"أنا ضد التدخين بشدة. يضر المدخن والمحيطين. يجب أن تبدأ التوعية مبكراً في المدارس.",erfahrungDe:"Mein Onkel begann mit 14 zu rauchen und bekam mit 50 Lungenkrebs. Das hat mich geprägt – ich rauche nicht.",erfahrungAr:"بدأ عمي التدخين في 14 وأصيب بسرطان الرئة في 50. أثر في كثيراً ولم أدخن أبداً."},
8:{meinungDe:"Fernsehen ist nicht per se schlecht, die Menge macht den Unterschied. Eltern sollten mit Kindern Sendungen auswählen.",meinungAr:"التلفاز ليس سيئاً بذاته، الكمية هي الفارق. على الآباء اختيار البرامج مع الأطفال.",erfahrungDe:"Meine Eltern erlaubten mir als Kind eine Stunde Fernsehen täglich. Das fand ich fair und lernte bewusst zu wählen.",erfahrungAr:"سمح لي والداي بساعة تلفاز يومياً في الطفولة. وجدتها عادلة وتعلمت الاختيار بوعي."},
9:{meinungDe:"Fernsehen kann bilden, wenn man bewusst wählt. Dokumentationen sind eine gute Ergänzung zum Unterricht.",meinungAr:"التلفاز يعلم إذا اخترت بوعي. الوثائقيات تكملة جيدة للتعليم المدرسي.",erfahrungDe:"Dokus über Natur und Technik weckten mein Interesse an Biologie. Ohne sie hätte ich nie Biologie studiert.",erfahrungAr:"الوثائقيات عن الطبيعة أيقظت اهتمامي بالأحياء. بدونها ما كنت لأدرس علم الأحياء."},
10:{meinungDe:"Tiere sollte man nicht spontan verschenken. Ein Tier ist jahrelange Verantwortung. Wer ein Tier möchte, sollte sich gut informieren.",meinungAr:"لا أهدِ حيواناً بشكل عفوي. الحيوان مسؤولية لسنوات. من يريد حيواناً فليستعد جيداً.",erfahrungDe:"Meine Cousine bekam zu Weihnachten einen Hamster. Nach drei Monaten gaben die Eltern ihn weg. Traurig.",erfahrungAr:"حصلت ابنة عمي على هامستر في الكريسماس. تخلص منه الوالدان بعد 3 أشهر. محزن."},
11:{meinungDe:"Klassenfahrten sind sehr wertvoll. Sie stärken die Gemeinschaft. Die Schule sollte durch Zuschüsse allen die Teilnahme ermöglichen.",meinungAr:"الرحلات المدرسية قيّمة جداً. تقوي روح الفصل. على المدرسة تمكين الجميع بالمشاركة عبر الدعم.",erfahrungDe:"Meine beste Klassenfahrt war in der 9. Klasse nach Berlin. Das hat uns als Klasse zusammengeschweißt.",erfahrungAr:"أفضل رحلة كانت في الصف التاسع إلى برلين. وحدتنا كفصل."},
12:{meinungDe:"Praktika sind wichtig für den Berufseinstieg, sollten aber fair vergütet werden. Unbezahlte Praktika sind ungerecht.",meinungAr:"التدريبات مهمة لدخول سوق العمل، يجب تعويضها. التدريب غير المدفوع غير عادل.",erfahrungDe:"Nach dem Studium arbeitete ich ein halbes Jahr unbezahlt als Praktikant. Tolle Erfahrung, finanziell eine Katastrophe.",erfahrungAr:"عملت نصف سنة كمتدرب غير مدفوع بعد التخرج. تجربة رائعة وكارثة مالية."},
13:{meinungDe:"Ich rate von Solarien ab. Die Risiken sind zu hoch. Besser Vitamin-D-Tabletten oder Tageslichtlampen.",meinungAr:"أنصح بعدم استخدام صالات الاستلقاء. المخاطر كبيرة. الأفضل أقراص فيتامين د أو مصابيح ضوء النهار.",erfahrungDe:"Eine Freundin ging regelmäßig ins Solarium und bekam mit 30 Hautkrebs. Das hat mir die Augen geöffnet.",erfahrungAr:"صديقة كانت تذهب لصالة الاستلقاء بانتظام، أصيبت بسرطان الجلد في 30. فتح عيني."},
14:{meinungDe:"Lachen ist die beste Medizin. Erwachsene sollten mehr lachen wie Kinder. Humor hilft in stressigen Situationen.",meinungAr:"الضحك أفضل دواء. على البالغين الضحك أكثر مثل الأطفال. الفكاهة تساعد في التوتر.",erfahrungDe:"Seit ich wöchentlich einen Comedy-Club besuche, fühle ich mich ausgeglichener und schlafe besser.",erfahrungAr:"منذ أزور نادي كوميديا أسبوعياً، أشعر بتوازن وأنام أفضل."},
15:{meinungDe:"Ich koche gerne selbst. Es braucht Zeit, aber schmeckt besser und ist gesünder. Fertiggerichte sind nur eine Notlösung.",meinungAr:"أحب الطبخ بنفسي. يحتاج وقتاً لكنه أطعم وأصح. الوجبات الجاهزة مجرد حل اضطرار.",erfahrungDe:"Seit ich wöchentlich Meal-Prep mache, spare ich Zeit und koche trotzdem frisch. Sonntags für 3 Tage vorkochen.",erfahrungAr:"منذ بدأت Meal-Prep أسبوعياً، أوفر الوقت ومازلت أطبخ طازجاً. الأحد أحضر طعام 3 أيام."},
16:{meinungDe:"Eine flexible Rente ist der beste Kompromiss. Wer länger arbeiten kann, sollte das dürfen. Niemand sollte gezwungen werden.",meinungAr:"التقاعد المرن أفضل حل وسط. من يستطيع العمل لفترة أطول، فليفعل. لا إجبار.",erfahrungDe:"Mein Vater hörte mit 65 auf und war unglücklich. Mit einem Minijob wurde er viel zufriedener.",erfahrungAr:"توقف والدي عن العمل في 65 وكان غير سعيد. بعمل بسيط أصبح أكثر رضا."},
17:{meinungDe:"Ich bin eher gegen Schuluniformen. Kinder sollten Toleranz auch ohne Kleiderordnung lernen. Uniformen kaschieren Probleme nur.",meinungAr:"أميل ضد الزي المدرسي. الأطفال يتعلمون التسامح بدون قواعد لباس. الزي يخفي المشاكل فقط.",erfahrungDe:"In meiner Schule gab es keine Uniform, aber niemand wurde wegen Kleidung gemobbt. Die Lehrer achteten auf ein gutes Klima.",erfahrungAr:"في مدرستي لم يكن هناك زي موحد، لكن لم يتنمر أحد بسبب الملابس. المعلمون اهتموا بالمناخ."},
18:{meinungDe:"Doping ist inakzeptabel. Es ist unfair und zerstört die Glaubwürdigkeit des Sports. Strengere Kontrollen sind nötig.",meinungAr:"المنشطات غير مقبولة. غير عادلة وتدمر مصداقية الرياضة. تشديد الرقابة ضروري.",erfahrungDe:"Ein Bekannter dopte als Hobbyradfahrer und bekam später Herzprobleme. Das zeigte mir die Gefahr.",erfahrungAr:"أحد معارفي تعاطى المنشطات كهواة وأصيب بمشاكل قلب. أراني الخطر."},
19:{meinungDe:"Eltern und Jugendliche sollten Ausgehzeiten gemeinsam besprechen. Feste Regeln geben Halt, zu viel Kontrolle zerstört Vertrauen.",meinungAr:"على الآباء والمراهقين الاتفاق على أوقات الخروج. القواعد تعطي دعماً، السيطرة المفرطة تدمر الثقة.",erfahrungDe:"Meine Eltern erlaubten mir mit 16 bis 22 Uhr auszugehen, wenn Hausaufgaben erledigt waren. Fairer Deal.",erfahrungAr:"سمح لي والداي في 16 بالخروج حتى 22:00 بعد الواجبات. صفقة عادلة."},
20:{meinungDe:"Antibiotika sind ein Segen, aber sie werden zu oft verschrieben. Heilpflanzen sind eine gute Alternative bei leichten Infekten.",meinungAr:"المضادات الحيوية نعمة لكنها توصف كثيراً. النباتات الطبية بديل جيد للالتهابات الخفيفة.",erfahrungDe:"Früher nahm ich Antibiotika bei jeder Erkältung. Jetzt nur noch, wenn es wirklich nötig ist.",erfahrungAr:"كنت أتناول المضادات لكل برد. الآن فقط عند الضرورة."},
21:{meinungDe:"Haustausch ist eine tolle Sache für günstiges Reisen. Man sollte aber einen Vertrag machen, um rechtlich abgesichert zu sein.",meinungAr:"تبادل المنازل رائع للسفر الرخيص. يجب عمل عقد للضمان القانوني.",erfahrungDe:"Letzten Sommer tauschte ich meine Wohnung gegen eine in Barcelona. Es hat reibungslos geklappt.",erfahrungAr:"الصيف الماضي بادلت شقتي بشقة في برشلونة. كل شيء سار بسلاسة."},
22:{meinungDe:"Zweisprachigkeit ist ein großer Vorteil. Kinder sollten früh beide Sprachen lernen. Eltern sollten konsequent sein.",meinungAr:"ثنائية اللغة ميزة كبيرة. الأطفال يتعلمون مبكراً. على الآباء أن يكونوا منتظمين.",erfahrungDe:"Ich bin zweisprachig aufgewachsen (Deutsch und Arabisch). Heute bin ich sehr dankbar dafür, besonders im Beruf.",erfahrungAr:"نشأت ثنائي اللغة (ألمانية وعربية). أنا ممتن جداً لذلك، خاصة في العمل."},
23:{meinungDe:"Jedes Paar sollte selbst entscheiden, wie es heiraten möchte. Eine kleine Hochzeit kann sehr schön und intim sein.",meinungAr:"كل زوجين يقرران بأنفسهما كيف يتزوجان. الزفاف الصغير يمكن أن يكون جميلاً وحميمياً.",erfahrungDe:"Ein befreundetes Paar heiratete heimlich auf dem Standesamt. Die Familie war anfangs sauer, akzeptierte es aber später.",erfahrungAr:"تزوج أصدقاء سراً في مكتب الأحوال. العائلة غضبت أولاً ثم تقبلت."},
24:{meinungDe:"Schönheitsoperationen bei Minderjährigen sollten verboten werden. Der Körper ist noch in Entwicklung. Selbstakzeptanz ist wichtiger.",meinungAr:"عمليات التجميل للقاصرين يجب أن تحظر. الجسم لا يزال في نمو. تقبل الذات أهم.",erfahrungDe:"Meine Schwester wollte mit 16 eine Nasenkorrektur. Nach einem Gespräch mit den Eltern ließ sie es. Heute ist sie froh.",erfahrungAr:"أرادت أختي في 16 تجميل الأنف. بعد التحدث مع والديها تركت الفكرة. اليوم سعيدة."},
25:{meinungDe:"Ganztagsschulen entlasten berufstätige Eltern. Die Nachmittagsangebote müssen qualitativ hochwertig sein.",meinungAr:"مدارس اليوم الكامل تخفف عن الآباء العاملين. عروض ما بعد الظهر يجب أن تكون عالية الجودة.",erfahrungDe:"Meine Nichte liebt die AGs in ihrer Ganztagsschule. Sie macht Theater und Kochen.",erfahrungAr:"ابنة أخي تحب الأنشطة في مدرستها. تمارس المسرح والطبخ."},
26:{meinungDe:"Ein Verbot von Gewaltspielen ist der falsche Weg. Die Ursachen von Gewalt sind komplexer. Eltern sollten mit Kindern sprechen.",meinungAr:"حظر ألعاب العنف طريق خطأ. أسباب العنف أكثر تعقيداً. على الآباء التحدث مع أطفالهم.",erfahrungDe:"Ich spielte als Teenager gewalttätige Spiele, bin aber friedlich geworden. Das Umfeld war entscheidender.",erfahrungAr:"لعبت ألعاب عنف في مراهقتي لكنني أصبحت مسالماً. البيئة كانت الأهم."},
27:{meinungDe:"Die Multikanal-Methode kann ich empfehlen. Lautes Sprechen und Zusammenfassen halfen mir sehr beim Deutschlernen.",meinungAr:"أنصح بطريقة القنوات المتعددة. التحدث بصوت عال والتلخيص ساعداني في تعلم الألمانية.",erfahrungDe:"Beim Deutschlernen sprach ich Vokabeln laut aus und schrieb sie auf. Das half mehr als stilles Lesen.",erfahrungAr:"في تعلم الألمانية، نطقت المفردات بصوت عال وكتبتها. أفاد أكثر من القراءة الصامتة."},
28:{meinungDe:"Convenience Food ist in Maßen okay. Man sollte aber zumindest ein paar einfache Gerichte selbst kochen können.",meinungAr:"الطعام المريح مقبول باعتدال. لكن على المرء معرفة طبخ بعض الأطباق البسيطة.",erfahrungDe:"In der Prüfungszeit lebte ich von Fertigpizza und war müde und schlapp. Seit ich frisch koche, geht es mir besser.",erfahrungAr:"في الامتحانات عشت على البيتزا الجاهزة. كنت متعباً. منذ أطبخ طازجاً، صحتي أفضل."},
29:{meinungDe:"Man sollte immer versuchen, den Eigentümer zu finden. Ehrlichkeit ist wichtig. Bei größeren Wertsachen ist das Fundbüro der richtige Weg.",meinungAr:"على المرء دائماً إيجاد المالك. الصدق مهم. للأشياء الثمينة، مكتب المفقودات هو الطريق الصحيح.",erfahrungDe:"Ich fand eine Geldbörse mit 200 Euro und gab sie ab. Der Besitzer bedankte sich – ein gutes Gefühl.",erfahrungAr:"وجدت محفظة بـ 200 يورو وأعدتها. شكرني المالك – شعور رائع."},
30:{meinungDe:"Hausaufgaben sind sinnvoll, aber in Maßen. Qualität vor Quantität. Nicht alle Kinder haben zu Hause Unterstützung.",meinungAr:"الواجبات المنزلية مفيدة باعتدال. الجودة قبل الكمية. ليس كل الأطفال يحصلون على مساعدة في المنزل.",erfahrungDe:"In meiner Schulzeit hatte ich stundenlange Hausaufgaben. Anstrengend und wenig bringend. Weniger, aber sinnvoller wäre besser.",erfahrungAr:"في دراستي كان لدي واجبات لساعات. مرهق وقليل الفائدة. الأفضل أقل لكن مفيد."},
31:{meinungDe:"Ich bevorzuge das Leben in der Stadt wegen der kurzen Wege und Kultur. Für Familien mit Kindern ist das Land aber oft besser.",meinungAr:"أفضل الحياة في المدينة لقصر المسافات والثقافة. للعائلات قد يكون الريف أفضل.",erfahrungDe:"Ich wohnte 5 Jahre auf dem Land, dann in der Stadt. Auf dem Land mehr Ruhe, in der Stadt flexibler.",erfahrungAr:"عشت 5 سنوات في الريف ثم في المدينة. في الريف هدوء، في المدينة مرونة."},
32:{meinungDe:"Es ist besorgniserregend, wie früh Kinder Handys bekommen. Eltern müssen über Risiken sprechen und Regeln aufstellen.",meinungAr:"مقلق كم يبكر حصول الأطفال على الهواتف. على الآباء التحدث عن المخاطر ووضع قواعد.",erfahrungDe:"Mein Bruder bekam mit 9 ein Handy und hatte bald Probleme mit Cybermobbing. Die Schule half.",erfahrungAr:"حصل أخي على هاتف في 9 وسرعان ما واجه تنمراً إلكترونياً. المدرسة ساعدت."},
33:{meinungDe:"Eine Woche ohne Internet wäre heute eine Herausforderung. Es wäre trotzdem wertvoll zu sehen, wie abhängig wir sind.",meinungAr:"أسبوع بدون إنترنت سيكون تحدياً. لكنه سيكون قيماً لرؤية مدى اعتمادنا.",erfahrungDe:"Im Urlaub hatte ich eine Woche kein Internet. Anfangs schwer, dann las ich mehr und verbrachte Zeit mit Familie.",erfahrungAr:"في عطلة لم يكن لدي إنترنت أسبوعاً. صعب أولاً، ثم قرأت أكثر وقضيت وقتاً مع العائلة."},
34:{meinungDe:"Eine Mischung aus digitalen und gedruckten Materialien ist ideal. Beides hat seine Berechtigung.",meinungAr:"مزيج المواد الرقمية والمطبوعة مثالي. لكليهما ما يبرره.",erfahrungDe:"An meiner Uni gibt es nur E-Books. Praktisch, aber ich kaufe manchmal gedruckte Bücher zum besseren Lesen.",erfahrungAr:"في جامعتي كتب إلكترونية فقط. عملي، لكني أشتري أحياناً كتباً مطبوعة للقراءة الأفضل."},
35:{meinungDe:"Hochbegabte brauchen Förderung, aber nicht Separation. Eine Mischung aus Förderung und Integration ist ideal.",meinungAr:"الموهوبون بحاجة لدعم لا فصل. مزيج الدعم والدمج مثالي.",erfahrungDe:"In meiner Schule gab es einen separaten Hochbegabtenkurs einmal pro Woche. Das hat gut funktioniert.",erfahrungAr:"في مدرستي كان فصل للموهوبين مرة أسبوعياً. نجح جيداً."},
36:{meinungDe:"Sparen für Kinder ist wichtig, am besten mit ETF-Sparplänen. Finanzbildung sollte auch in der Schule vermittelt werden.",meinungAr:"الادخار للأطفال مهم، أفضل عبر خطط ETF. التثقيف المالي يجب أن يدرس في المدرسة.",erfahrungDe:"Meine Eltern richteten mir ab Geburt einen ETF-Sparplan ein. Mit 18 hatte ich eine schöne Summe.",erfahrungAr:"والداي افتتحا لي خطة ETF منذ ولادتي. في 18 كان لدي مبلغ جميل."},
37:{meinungDe:"Tierversuche sind ein ethisches Dilemma. Wir brauchen sie für medizinischen Fortschritt, aber Alternativen sollten mehr gefördert werden.",meinungAr:"تجارب الحيوانات معضلة أخلاقية. نحتاجها للتقدم الطبي، لكن البدائل يجب أن تدعم أكثر.",erfahrungDe:"Im Biologiestudium begleitete ich einen Tierversuch. Wissenschaftlich wichtig, aber ich hatte ein schlechtes Gewissen.",erfahrungAr:"في دراسة الأحياء رافقت تجربة على الحيوانات. مهم علمياً لكن ضميري كان يعذبني."},
38:{meinungDe:"Hausfrau zu sein ist eine persönliche Entscheidung. Jede Frau sollte selbst wählen dürfen. Die Gesellschaft sollte beides akzeptieren.",meinungAr:"ربة البيت قرار شخصي. كل امرأة تختار بنفسها. على المجتمع تقبل كلا الخيارين.",erfahrungDe:"Meine Mutter war Hausfrau und sehr glücklich. Meine Schwester arbeitet Vollzeit und ist auch glücklich. Beides ist okay.",erfahrungAr:"والدتي كانت ربة بيت وسعيدة جداً. أختي تعمل دوام كامل وسعيدة أيضاً. كلا الأمرين مقبول."},

function getExam(id) { try { return THEME_EXAM[id] } catch(e) { return null } }
function patchThemes() {
    THEMES.forEach(t => {
        const e = THEME_EXTRA[t.id];
        if (e) { t.meinungDe = e.meinungDe; t.meinungAr = e.meinungAr; t.erfahrungDe = e.erfahrungDe; t.erfahrungAr = e.erfahrungAr; }
    });
}

let state = {
    done: JSON.parse(localStorage.getItem('b2_done') || '[]'),
    tab: 'themes',
    currentTheme: null,
    exam: localStorage.getItem('b2_exam') === '1',
    myVocab: JSON.parse(localStorage.getItem('b2_myvocab') || '[]'),
    savedSections: JSON.parse(localStorage.getItem('b2_savedSections') || '[]'),
    quiz: { source: 'all', idx: 0, correct: 0, total: 0, pool: [], answered: false }
};
function saveDone() { localStorage.setItem('b2_done', JSON.stringify(state.done)); }
function saveMyVocab() { localStorage.setItem('b2_myvocab', JSON.stringify(state.myVocab)); }
function saveMySections() { localStorage.setItem('b2_savedSections', JSON.stringify(state.savedSections)); }
function toggleExam() {
    state.exam = !state.exam;
    localStorage.setItem('b2_exam', state.exam ? '1' : '0');
    document.getElementById('examBtn').classList.toggle('on', state.exam);
    document.getElementById('examHint').classList.toggle('show', state.exam);
    if (state.currentTheme) openTheme(state.currentTheme.id);
}
function em() { return state.exam; }
function toggleSection(el) {
    const icon = el.querySelector('.toggle-icon');
    const content = el.parentElement.querySelector('.section-content');
    if (content) { content.classList.toggle('open'); if(icon) icon.classList.toggle('open'); }
}
function saveVocabFromTheme(de, ar, btn) {
    if (state.myVocab.some(v => v.de === de && v.ar === ar)) return;
    state.myVocab.push({de, ar});
    saveMyVocab();
    updateStats();
    btn.textContent = '✓'; btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = '+'; btn.style.color = ''; }, 1500);
}
function saveSectionFromTheme(sectionId, themeId) {
    const t = THEMES.find(x => x.id === themeId); if (!t) return;
    const map = {
        inhalt: { title: t.icon+' Inhalt', text: t.textDe, ar: t.textAr },
        meinung: { title: t.icon+' Meinung', text: t.meinungDe, ar: t.meinungAr },
        erfahrung: { title: t.icon+' Erfahrung', text: t.erfahrungDe, ar: t.erfahrungAr }
    };
    const item = map[sectionId]; if (!item || !item.text) return;
    const key = themeId+'_'+sectionId;
    if (state.savedSections.some(s => s.key === key)) return;
    state.savedSections.push({ key, themeId, sectionId, title: item.title, text: item.text, ar: item.ar });
    saveMySections();
    updateStats();
    const btn = document.getElementById('saveSec_'+sectionId);
    if (btn) { btn.textContent = '✓'; btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green)';
        setTimeout(() => { btn.textContent = '📋'; btn.style.color = ''; btn.style.borderColor = ''; }, 1500); }
}

function init() {
    try {
        patchThemes();
        document.getElementById('examBtn').classList.toggle('on', state.exam);
        updateStats();
        render();
    } catch(e) { console.error('init error:', e); }
}

function switchTab(tab) {
    state.tab = tab;
    state.currentTheme = null;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('detailView').style.display = 'none';
    document.getElementById('themeListView').style.display = 'block';
    const isSearch = ['themes','problems'].includes(tab);
    const sw = document.getElementById('searchWrap');
    sw.style.display = isSearch ? 'block' : 'none';
    document.getElementById('searchInput').placeholder = tab === 'problems' ? 'Aufgabe suchen...' : 'Thema suchen...';
    if (tab === 'myvocab') { myVocabTab = 'vocab'; renderMyVocab(); }
    else if (tab === 'quiz') initQuiz();
    else if (tab === 'phrases') renderPhrases();
    else if (tab === 'vocab') renderVocab();
    else render();
}
function filterThemes() { render(); }

let currentWordPopup = null;

function showWordMeaning(event, word) {
    event.stopPropagation();
    if (currentWordPopup) { currentWordPopup.remove(); currentWordPopup = null; }
    const w = word.replace(/[.,!?;:()"'\u2018\u2019\u201C\u201D\u2013\u2014\u00ab\u00bb]/g,'').toLowerCase().trim();
    const meaning = VERB_DICT[w];
    const popup = document.createElement('div');
    popup.className = 'word-popup';
    const escapedWord = word.replace(/'/g,"\\'");
    const encodedWord = encodeURIComponent(word);
    let html = `<div class="wp-word">${word}</div>`;
    if (meaning) {
        html += `<div class="wp-meaning">🇸🇦 ${meaning}</div>`;
    } else {
        html += `<div class="wp-hint">⏳ Lade Übersetzung...</div>`;
    }
    html += `<div class="wp-actions">
        <button class="wp-btn" onclick="speakWord('${escapedWord}');this.classList.toggle('playing')">🔊 Audio</button>
        <button class="wp-btn" onclick="window.open('https://www.dict.cc/?s=${encodedWord}','_blank')">📖 dict.cc</button>
        <button class="wp-btn" onclick="this.closest('.word-popup').remove();currentWordPopup=null">✕</button>
    </div>`;
    popup.innerHTML = html;
    const x = Math.min(event.clientX || event.touches?.[0]?.clientX || 0, window.innerWidth - 240);
    const y = Math.min(event.clientY || event.touches?.[0]?.clientY || 0, window.innerHeight - 170);
    popup.style.left = Math.max(8, x) + 'px';
    popup.style.top = Math.max(8, y + 8) + 'px';
    document.body.appendChild(popup);
    currentWordPopup = popup;
    // Fetch translation from MyMemory API if not in dictionary
    if (!meaning) {
        fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(w) + '&langpair=de|ar')
            .then(function(r){ return r.json(); })
            .then(function(data){
                if (popup.parentNode && data.responseData && data.responseData.translatedText) {
                    var t = data.responseData.translatedText;
                    var hint = popup.querySelector('.wp-hint');
                    if (hint) {
                        if (t.toLowerCase() !== w.toLowerCase()) {
                            hint.innerHTML = '🇸🇦 ' + t;
                            hint.className = 'wp-meaning';
                        } else {
                            hint.innerHTML = '⚠️ Keine Übersetzung gefunden';
                        }
                    }
                }
            })
            .catch(function(){
                var hint = popup.querySelector('.wp-hint');
                if (hint) hint.innerHTML = '⚠️ Übersetzungsfehler';
            });
    }
    // Close on outside click
    setTimeout(function(){
        var closer = function(e) { if (currentWordPopup && !currentWordPopup.contains(e.target)) { currentWordPopup.remove(); currentWordPopup = null; document.removeEventListener('click', closer); document.removeEventListener('touchstart', closer); } };
        document.addEventListener('click', closer, { once: true });
        document.addEventListener('touchstart', closer, { once: true });
    }, 200);
}

function speakWord(word) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        document.querySelectorAll('.tts-btn.playing').forEach(function(b){b.classList.remove('playing');});
        var utter = new SpeechSynthesisUtterance(word);
        utter.lang = 'de-DE';
        utter.rate = 0.82;
        var v = getVoice(); if (v) utter.voice = v;
        window.speechSynthesis.speak(utter);
    }
}
function speakText(btn, text) {
    if ('speechSynthesis' in window) {
        if (btn.classList.contains('playing')) {
            window.speechSynthesis.cancel();
            btn.classList.remove('playing');
            return;
        }
        window.speechSynthesis.cancel();
        document.querySelectorAll('.tts-btn.playing').forEach(function(b){b.classList.remove('playing');});
        btn.classList.add('playing');
        var utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'de-DE';
        utter.rate = 0.82;
        var v = getVoice(); if (v) utter.voice = v;
        utter.onend = function(){ btn.classList.remove('playing'); };
        utter.onerror = function(){ btn.classList.remove('playing'); };
        window.speechSynthesis.speak(utter);
    }
}
function playAllTheme() {
    var t = state.currentTheme;
    if (!t) return;
    var btn = document.getElementById('playAllBtn');
    var texts = [];
    if (t.textDe) texts.push(t.textDe);
    var ex = getExam(t.id);
    if (ex && ex.teil2De) texts.push(ex.teil2De);
    if (t.meinungDe) texts.push(t.meinungDe);
    if (t.erfahrungDe) texts.push(t.erfahrungDe);
    if (t.problem) {
        var pDe = (ex && ex.teil3De) || t.problem.textDe;
        if (pDe) texts.push(pDe);
    }
    var full = texts.join('. ').replace(/\s+/g,' ');
    if (!full) return;
    if ('speechSynthesis' in window) {
        if (btn.classList.contains('playing')) {
            window.speechSynthesis.cancel();
            btn.classList.remove('playing');
            return;
        }
        window.speechSynthesis.cancel();
        document.querySelectorAll('.tts-btn.playing').forEach(function(b){b.classList.remove('playing');});
        btn.classList.add('playing');
        var utter = new SpeechSynthesisUtterance(full);
        utter.lang = 'de-DE';
        utter.rate = 0.82;
        var v = getVoice(); if (v) utter.voice = v;
        utter.onend = function(){ btn.classList.remove('playing'); };
        utter.onerror = function(){ btn.classList.remove('playing'); };
        window.speechSynthesis.speak(utter);
    }
}

// ============================================================
var availableVoices = [];
var selectedVoiceURI = localStorage.getItem('b2_voice') || '';

function loadVoices() {
    if (!('speechSynthesis' in window)) return;
    var all = speechSynthesis.getVoices();
    availableVoices = all.filter(function(v){ return v.lang && v.lang.startsWith('de'); });
    var sel = document.getElementById('voiceSelect');
    if (!sel) return;
    if (!availableVoices.length) { sel.style.display = 'none'; return; }
    var html = '<option value="">🇩🇪 Standard</option>';
    availableVoices.forEach(function(v){
        var label = v.name + (v.localService ? '' : ' ☁');
        var selAttr = (selectedVoiceURI === v.voiceURI) ? 'selected' : '';
        html += '<option value="' + v.voiceURI.replace(/"/g,'&quot;') + '" ' + selAttr + '>' + label + '</option>';
    });
    sel.innerHTML = html;
    sel.style.display = 'inline-block';
    // If none selected yet, prefer a female-sounding German voice
    if (!selectedVoiceURI) {
        var pref = availableVoices.find(function(v){ return /zira|heidi|anna|petra|yvonne|female|weiblich/i.test(v.name); }) || availableVoices[0];
        if (pref) {
            selectedVoiceURI = pref.voiceURI;
            localStorage.setItem('b2_voice', selectedVoiceURI);
            sel.value = selectedVoiceURI;
        }
    }
}

function setVoice(val) {
    selectedVoiceURI = val;
    if (val) localStorage.setItem('b2_voice', val);
    else localStorage.removeItem('b2_voice');
}

function getVoice() {
    if (!selectedVoiceURI) return null;
    return availableVoices.find(function(v){ return v.voiceURI === selectedVoiceURI; }) || null;
}

// Load voices immediately (for browsers that have them sync) and on voiceschanged event
if ('speechSynthesis' in window) {
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;
}


function clickableText(text) {
    if (!text) return '';
    return text.replace(/([\w\u00C0-\u024F]+)/g, function(m) {
        return '<span class="cw" onclick="showWordMeaning(event,\'' + m.replace(/'/g,"\\'") + '\')">' + m + '</span>';
    });
}

function askQuestion() {
    const input = document.getElementById('qaInput');
    const q = input.value.trim();
    if (!q) return;
    const t = state.currentTheme;
    const ql = q.toLowerCase();
    let answer = '';
    if (ql.includes('text')||ql.includes('inhalt')||ql.includes('worüber')||ql.includes('zusammenfass'))
        answer = em() ? `Text: ${t.textDe}` : `Text: ${t.textDe} / ${t.textAr}`;
    else if (ql.includes('pro')||ql.includes('vorteil')||ql.includes('dafür'))
        answer = 'Pro: '+(t.proDe||[]).join(' • ');
    else if (ql.includes('contra')||ql.includes('nachteil')||ql.includes('dagegen'))
        answer = 'Contra: '+(t.contraDe||[]).join(' • ');
    else if (ql.includes('vokabel')||ql.includes('wort'))
        answer = 'Vokabeln: '+(t.vocab||[]).map(v=>v.de+(em()?'':' ('+v.ar+')')).join(', ');
    else if (ql.includes('meinung')||ql.includes('findest')||ql.includes('denkst'))
        answer = t.meinungDe || 'Keine Meinung verfügbar.';
    else if (ql.includes('erfahrung')||ql.includes('erlebnis'))
        answer = t.erfahrungDe || 'Keine Erfahrung verfügbar.';
    else if (ql.includes('redemittel')||ql.includes('satz')||ql.includes('phras'))
        answer = 'Redemittel: '+(t.phrasesDe||[]).join(' • ');
    else if (ql.includes('lösung')||ql.includes('aufgabe')||ql.includes('ideen'))
        answer = t.problem ? `Aufgabe: ${t.problem.titleDe}. Ideen: ${(t.problemIdeasDe||[]).join(', ')}` : 'Keine Aufgabe.';
    else if (ql.includes('übersetz')||ql.includes('bedeutet')||ql.includes('was heißt')||ql.includes('arabisch')) {
        const words = ql.replace(/[?.,!]/g,'').split(' ');
        let found = [];
        (t.vocab||[]).forEach(v => { words.forEach(w=>{ if(w.length>3&&(v.de.toLowerCase().includes(w)||v.ar.toLowerCase().includes(w))) found.push(v); }); });
        answer = found.length ? found.map(v=>`${v.de} = ${v.ar}`).join('\n') : 'Nicht gefunden.';
    } else {
        const a = [];
        if (t.proDe&&t.proDe.length) a.push('Pro: '+t.proDe[0]);
        if (t.contraDe&&t.contraDe.length) a.push('Contra: '+t.contraDe[0]);
        if (t.vocab&&t.vocab.length) a.push('Vokabel: '+t.vocab[0].de+(em()?'':' = '+t.vocab[0].ar));
        answer = a.length ? a.join('. ')+'. Frag mich zu Pro, Contra, Vokabeln, Meinung oder Erfahrung!' : 'Frag mich zu diesem Thema!';
    }
    document.getElementById('qaQuestion').textContent = 'Frage: '+q;
    const ans = document.getElementById('qaAnswer');
    ans.textContent = answer; ans.classList.add('show');
    const d = ans.closest('details'); if(d) d.open = true;
}

function initQuiz() {
    state.quiz.idx = 0; state.quiz.correct = 0; state.quiz.total = 0;
    state.quiz.answered = false; state.quiz.source = 'all';
    buildQuizPool();
}
function buildQuizPool() {
    const p = [];
    if (state.quiz.source === 'all') {
        THEMES.forEach(t => { if(t.vocab) t.vocab.forEach(v => p.push(v)); });
    } else if (state.quiz.source === 'my') {
        state.myVocab.forEach(v => p.push(v));
    }
    if (!p.length) {
        document.getElementById('themeGrid').innerHTML = '<div class="empty-state"><div class="big">🧠</div>Keine Vokabeln fürs Quiz. Füge eigene hinzu oder öffne ein Thema.</div>';
        return;
    }
    // Shuffle
    for (let i = p.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [p[i], p[j]] = [p[j], p[i]]; }
    state.quiz.pool = p.slice(0, 20);
    renderQuiz();
}
function setQuizSource(src) {
    state.quiz.source = src;
    document.querySelectorAll('.exam-source button').forEach(b => b.classList.toggle('active', b.dataset.src === src));
    buildQuizPool();
}
function renderQuiz() {
    const grid = document.getElementById('themeGrid');
    const pool = state.quiz.pool;
    if (!pool.length) { grid.innerHTML = '<div class="empty-state"><div class="big">🧠</div>Keine Vokabeln. Füge eigene hinzu!</div>'; return; }
    const idx = state.quiz.idx;
    if (idx >= pool.length) {
        const score = Math.round((state.quiz.correct / state.quiz.total) * 100);
        grid.innerHTML = `<div class="exam-card">
            <div class="big" style="font-size:40px">🎉</div>
            <div style="font-size:18px;font-weight:800;margin:8px 0">Quiz beendet!</div>
            <div style="font-size:14px;color:var(--text-dim)">${state.quiz.correct} / ${state.quiz.total} richtig (${score}%)</div>
            <div style="margin-top:12px"><button class="add-btn" onclick="initQuiz()">🔄 Nochmal</button></div>
        </div>`;
        return;
    }
    const word = pool[idx];
    // Generate wrong options
    let wrong = [];
    const allPool = [...THEMES.flatMap(t => t.vocab || []), ...state.myVocab];
    const shuffled = [...allPool].sort(() => Math.random() - 0.5);
    for (const w of shuffled) {
        if (w.de !== word.de && !wrong.includes(w.ar) && wrong.length < 3) wrong.push(w.ar);
    }
    while (wrong.length < 3) wrong.push('???');
    // Options (correct + 3 wrong, shuffled)
    const opts = [{text: word.ar, correct: true}, ...wrong.map(w => ({text: w, correct: false}))];
    for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [opts[i], opts[j]] = [opts[j], opts[i]]; }
    const progress = ((idx) / pool.length) * 100;
    grid.innerHTML = `
    <div class="exam-source">
        <button data-src="all" class="active" onclick="setQuizSource('all')">📚 Alle Themen</button>
        <button data-src="my" onclick="setQuizSource('my')">📝 Meine Vokabeln</button>
    </div>
    <div class="exam-progress"><div class="exam-progress-bar" style="width:${progress}%"></div></div>
    <div class="exam-card">
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px">${idx+1} / ${pool.length}</div>
        <div class="exam-word">${word.de}</div>
        <div class="exam-trans ${state.quiz.answered?'show':''}">${word.ar}</div>
        <div class="exam-options">`;
    opts.forEach((o, i) => {
        const cls = state.quiz.answered ? (o.correct ? 'correct' : '') : '';
        grid.innerHTML += `<button class="exam-opt ${cls}" onclick="answerQuiz(${i},${o.correct})" ${state.quiz.answered?'disabled':''}>${o.text}</button>`;
    });
    grid.innerHTML += `</div>
        <div class="exam-score">✅ ${state.quiz.correct} / ${state.quiz.total}</div>
        <div style="margin-top:8px"><button class="add-btn" onclick="nextQuiz()" style="${state.quiz.answered?'':'display:none'}">➡️ Nächste</button></div>
    </div>`;
}
function answerQuiz(optIdx, correct) {
    if (state.quiz.answered) return;
    state.quiz.answered = true;
    state.quiz.total++;
    if (correct) state.quiz.correct++;
    renderQuiz();
}
function nextQuiz() {
    state.quiz.idx++;
    state.quiz.answered = false;
    renderQuiz();
}

        {de:"die Ausgabe",ar:"المصروف",ctx:"Budget, Geldausgeben",ctxAr:"الميزانية، إنفاق المال",ex:"Ich sollte meine Ausgaben besser kontrollieren.",exAr:"يجب أن أتحكم بمصاريفي بشكل أفضل."},
        {de:"das Sparkonto",ar:"حساب التوفير",ctx:"Sparen, Finanzen",ctxAr:"الادخار، المالية",ex:"Ein Sparkonto ist sicher, aber die Zinsen sind niedrig.",exAr:"حساب التوفير آمن لكن الفائدة منخفضة."},
        {de:"die Verschuldung",ar:"المديونية",ctx:"Probleme, Kredite",ctxAr:"مشاكل، قروض",ex:"Viele junge Menschen haben Probleme mit Verschuldung.",exAr:"كثير من الشباب لديهم مشاكل مع المديونية."},
        {de:"der Konsum",ar:"الاستهلاك",ctx:"Gesellschaft, Wirtschaft",ctxAr:"المجتمع، الاقتصاد",ex:"Unser Konsumverhalten beeinflusst die Umwelt.",exAr:"سلوكنا الاستهلاكي يؤثر على البيئة."},
        {de:"die Inflation",ar:"التضخم",ctx:"Wirtschaft, Preise",ctxAr:"الاقتصاد، الأسعار",ex:"Die Inflation steigt und alles wird teurer.",exAr:"التضخم يرتفع وكل شيء يصبح أغلى."},
    ]},
];
let vocabCatOpen = {};
function renderVocab() {
    const grid = document.getElementById('themeGrid');
    let html = '<div class="vocab-list">';
    B2_VOCAB.forEach((cat, ci) => {
        const isOpen = vocabCatOpen[ci] || false;
        html += `<div class="vocab-cat">
            <div class="vocab-cat-header ${isOpen?'open':''}" onclick="toggleVocabCat(${ci})">
                <span class="vcat-icon">${cat.icon}</span>
                <span class="vcat-title">${cat.cat} <span style="color:var(--ar);font-weight:400">(${cat.catAr})</span></span>
                <span class="vcat-count">${cat.words.length}</span>
                <span class="vcat-arrow">▶</span>
            </div>
            <div class="vocab-cat-body ${isOpen?'open':''}">`;
        if (em()) {
            cat.words.forEach(w => { html += `<div class="vword"><div class="vw-de">${w.de}</div><div class="vw-ctx">📌 ${w.ctx}</div><div class="vw-ex">💬 ${w.ex}</div></div>`; });
        } else {
            cat.words.forEach(w => {
                html += `<div class="vword"><div class="vw-de">${w.de}</div><div class="vw-ar">${w.ar}</div>
                    <div class="vw-ctx">📌 ${w.ctx} / ${w.ctxAr}</div>
                    <div class="vw-ex">💬 ${w.ex}</div><div class="vw-ex-ar">${w.exAr}</div></div>`;
            });
        }
        html += `</div></div>`;
    });
    html += '</div>';
    grid.innerHTML = html;
}
function toggleVocabCat(ci) {
    vocabCatOpen[ci] = !vocabCatOpen[ci];
    renderVocab();
}
